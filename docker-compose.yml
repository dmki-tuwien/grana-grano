services:
  frontend:
    extends:
      file: "frontend/docker-compose.yml"
      service: lpg-normalization-frontend
    networks:
      - app-network

  neo4j:
    extends:
      file: "backend/docker-compose.yml"
      service: neo4j
    env_file:
      - path: ./backend/.env
    networks:
      - app-network

  memgraph:
    extends:
      file: "backend/docker-compose.yml"
      service: memgraph
    networks:
      - app-network

  restapi:
    extends:
      file: "backend/docker-compose.yml"
      service: restapi
    env_file:
      - path: ./backend/.env
    networks:
      - app-network

  reverse-proxy:
    image: nginx
    ports:
      - "8080:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
