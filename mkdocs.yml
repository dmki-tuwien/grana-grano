site_name: GraNa-GraNo
theme:
  name: material
  palette:
    primary: red
  favicon: assets/favicon.ico
  logo: assets/logo.png
  features:
    - content.tooltips
markdown_extensions:
  - abbr
  - attr_list
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.arithmatex:
      generic: true

plugins:
  - glightbox


extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

watch:
  - includes